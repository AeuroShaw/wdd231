<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A0A2E"/>
  <!-- Adire pattern background circles -->
  <circle cx="100" cy="95" r="72" fill="none" stroke="#6A3FA0" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="95" r="55" fill="none" stroke="#6A3FA0" stroke-width="1" opacity="0.3"/>
  <!-- Adire-style diamond grid -->
  <g opacity="0.18" stroke="#D4A017" stroke-width="0.8" fill="none">
    <line x1="40" y1="30" x2="160" y2="160"/>
    <line x1="60" y1="30" x2="170" y2="140"/>
    <line x1="30" y1="50" x2="150" y2="170"/>
    <line x1="160" y1="30" x2="40"  y2="160"/>
    <line x1="140" y1="30" x2="30"  y2="140"/>
    <line x1="170" y1="50" x2="50"  y2="170"/>
  </g>
  <!-- Mask / face (Yoruba art inspired) -->
  <ellipse cx="100" cy="90" rx="36" ry="45" fill="#6A3FA0"/>
  <!-- Face features -->
  <ellipse cx="88"  cy="80" rx="6" ry="8" fill="#1A0A2E"/>
  <ellipse cx="112" cy="80" rx="6" ry="8" fill="#1A0A2E"/>
  <!-- Nose bridge -->
  <line x1="100" y1="85" x2="100" y2="100" stroke="#FAF7F2" stroke-width="1.5" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M 88 108 Q 100 118 112 108" stroke="#FAF7F2" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tribal marks (ila Ibadan) -->
  <line x1="80" y1="78" x2="75" y2="100" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <line x1="83" y1="78" x2="78" y2="100" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="78" x2="125" y2="100" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <line x1="117" y1="78" x2="122" y2="100" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown / headdress -->
  <path d="M 64,45 Q 100,15 136,45 Q 120,50 100,48 Q 80,50 64,45 Z" fill="#D4A017"/>
  <circle cx="100" cy="30" r="5" fill="#D4A017"/>
  <circle cx="82"  cy="36" r="4" fill="#D4A017"/>
  <circle cx="118" cy="36" r="4" fill="#D4A017"/>
  <!-- Palette dots at bottom -->
  <circle cx="62"  cy="158" r="8" fill="#C0392B"/>
  <circle cx="82"  cy="162" r="8" fill="#F5C518"/>
  <circle cx="102" cy="164" r="8" fill="#1A8A5A"/>
  <circle cx="122" cy="162" r="8" fill="#1E5799"/>
  <circle cx="142" cy="158" r="8" fill="#6A3FA0"/>
  <!-- Text -->
  <text x="100" y="187" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-weight="700" fill="#D4A017" letter-spacing="0.5">IBADAN CREATIVE ARTS</text>
</svg>
