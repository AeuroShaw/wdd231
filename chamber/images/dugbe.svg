  <!-- Windows/goods -->
  <rect x="38" y="108" width="30" height="20" rx="3" fill="#FAF7F2" opacity="0.85"/>
  <rect x="85" y="108" width="30" height="20" rx="3" fill="#FAF7F2" opacity="0.85"/>
  <rect x="132" y="108" width="30" height="20" rx="3" fill="#FAF7F2" opacity="0.85"/>
