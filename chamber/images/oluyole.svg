<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#2A2A2A"/>
  <!-- Factory building -->
  <rect x="25" y="105" width="150" height="65" rx="3" fill="#444"/>
  <!-- Factory roof with sawtooth skylights -->
  <polygon points="25,105 55,75 55,105" fill="#555"/>
  <polygon points="55,105 85,75 85,105" fill="#555"/>
  <polygon points="85,105 115,75 115,105" fill="#555"/>
  <polygon points="115,105 145,75 145,105" fill="#555"/>
  <polygon points="145,105 175,75 175,105" fill="#555"/>
  <!-- Skylight glass -->
  <polygon points="38,105 55,80 55,105" fill="#87CEEB" opacity="0.4"/>
  <polygon points="68,105 85,80 85,105" fill="#87CEEB" opacity="0.4"/>
  <polygon points="98,105 115,80 115,105" fill="#87CEEB" opacity="0.4"/>
  <polygon points="128,105 145,80 145,105" fill="#87CEEB" opacity="0.4"/>
  <polygon points="158,105 175,80 175,105" fill="#87CEEB" opacity="0.4"/>
  <!-- Windows on main building -->
  <rect x="38"  y="118" width="18" height="16" rx="2" fill="#87CEEB" opacity="0.5"/>
  <rect x="68"  y="118" width="18" height="16" rx="2" fill="#87CEEB" opacity="0.5"/>
  <rect x="98"  y="118" width="18" height="16" rx="2" fill="#87CEEB" opacity="0.5"/>
  <rect x="128" y="118" width="18" height="16" rx="2" fill="#87CEEB" opacity="0.5"/>
  <!-- Door -->
  <rect x="86" y="143" width="28" height="27" rx="2" fill="#222"/>
  <!-- Chimney / smoke stack -->
  <rect x="155" y="50" width="12" height="55" rx="2" fill="#555"/>
  <!-- Smoke puffs -->
  <circle cx="161" cy="44" r="7"  fill="#888" opacity="0.5"/>
  <circle cx="155" cy="34" r="6"  fill="#888" opacity="0.35"/>
  <circle cx="167" cy="30" r="5"  fill="#888" opacity="0.25"/>
  <!-- Gear icon -->
  <circle cx="42" cy="68" r="16" fill="none" stroke="#D4A017" stroke-width="3"/>
  <circle cx="42" cy="68" r="7"  fill="#D4A017"/>
  <rect x="39" y="48" width="6" height="8" rx="2" fill="#D4A017"/>
  <rect x="39" y="80" width="6" height="8" rx="2" fill="#D4A017"/>
  <rect x="22" y="65" width="8" height="6" rx="2" fill="#D4A017"/>
  <rect x="54" y="65" width="8" height="6" rx="2" fill="#D4A017"/>
  <rect x="27" y="53" width="6" height="6" rx="2" fill="#D4A017" transform="rotate(45 30 56)"/>
  <rect x="51" y="53" width="6" height="6" rx="2" fill="#D4A017" transform="rotate(45 54 56)"/>
  <rect x="27" y="75" width="6" height="6" rx="2" fill="#D4A017" transform="rotate(45 30 78)"/>
  <rect x="51" y="75" width="6" height="6" rx="2" fill="#D4A017" transform="rotate(45 54 78)"/>
  <!-- Text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#D4A017" letter-spacing="0.3">OLUYOLE INDUSTRIAL</text>
</svg>
