<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A2A4A"/>
  <!-- Hill shape (Mokola Hill) -->
  <ellipse cx="100" cy="175" rx="95" ry="55" fill="#243B6A"/>
  <!-- Hotel building -->
  <rect x="55" y="80" width="90" height="85" rx="4" fill="#FAF7F2"/>
  <!-- Roof / pediment -->
  <polygon points="45,80 100,42 155,80" fill="#C8A22A"/>
  <!-- Column lines -->
  <rect x="68" y="80" width="5" height="85" fill="#E0D8C8" opacity="0.6"/>
  <rect x="85" y="80" width="5" height="85" fill="#E0D8C8" opacity="0.6"/>
  <rect x="112" y="80" width="5" height="85" fill="#E0D8C8" opacity="0.6"/>
  <rect x="129" y="80" width="5" height="85" fill="#E0D8C8" opacity="0.6"/>
  <!-- Windows -->
  <rect x="73" y="92" width="14" height="14" rx="2" fill="#1A2A4A" opacity="0.5"/>
  <rect x="93" y="92" width="14" height="14" rx="2" fill="#1A2A4A" opacity="0.5"/>
  <rect x="113" y="92" width="14" height="14" rx="2" fill="#1A2A4A" opacity="0.5"/>
  <rect x="73" y="114" width="14" height="14" rx="2" fill="#1A2A4A" opacity="0.5"/>
  <rect x="113" y="114" width="14" height="14" rx="2" fill="#1A2A4A" opacity="0.5"/>
  <!-- Door -->
  <rect x="88" y="138" width="24" height="27" rx="2" fill="#1A2A4A" opacity="0.6"/>
  <!-- Flag -->
  <rect x="98" y="30" width="3" height="14" fill="#FAF7F2"/>
  <polygon points="101,30 118,36 101,42" fill="#C8A22A"/>
  <!-- Stars -->
  <text x="30" y="50" font-size="10" fill="#C8A22A" opacity="0.7">★</text>
  <text x="162" y="50" font-size="10" fill="#C8A22A" opacity="0.7">★</text>
  <!-- Text -->
  <text x="100" y="182" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="700" fill="#C8A22A" letter-spacing="0.5">PREMIER HOTEL</text>
</svg>
